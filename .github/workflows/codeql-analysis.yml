name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  analyze:
    name: Analyze
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp', 'actions']
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@868e2ea5641bfa2e2af1f144664178b4c5575fab
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
    - name: Set up MSVC compiler
      if: matrix.language == 'cpp'
      uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
      with:
        arch: x86
        toolset: 14.44.35207
        sdk: 10.0.26100.0
    - name: Initialize CodeQL
      uses: github/codeql-action/init@868e2ea5641bfa2e2af1f144664178b4c5575fab
      with:
        languages: ${{ matrix.language }}
    - name: Configure and Build (Rome 2)
      if: matrix.language == 'cpp'
      run: |
        cmake -S . -B build/codeql-rome2 --preset ci-release -DTW_GAME=rome2
        cmake --build build/codeql-rome2
    - name: Configure and Build (Attila)
      if: matrix.language == 'cpp'
      run: |
        cmake -S . -B build/codeql-attila --preset ci-release -DTW_GAME=attila
        cmake --build build/codeql-attila
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@868e2ea5641bfa2e2af1f144664178b4c5575fab
      with:
        category: "/language:${{matrix.language}}"
